<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino Buzzer Emulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeecea;
      --text: #1a1a18; --text2: #6b6b67;
      --bdr: rgba(0,0,0,0.12); --bdr2: rgba(0,0,0,0.22);
      --info-bg: #e6f1fb; --info-text: #185fa5;
      --warn-bg: #faeeda; --warn-text: #854f0b;
      --suc-bg: #eaf3de; --suc-text: #3b6d11;
      --r: 8px; --rl: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
        --text: #f0ede8; --text2: #9a9994;
        --bdr: rgba(255,255,255,0.12); --bdr2: rgba(255,255,255,0.22);
        --info-bg: #0c447c; --info-text: #b5d4f4;
        --warn-bg: #633806; --warn-text: #fac775;
        --suc-bg: #27500a; --suc-text: #c0dd97;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--bdr);
      border-radius: var(--rl);
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }

    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
    code { font-family: monospace; font-size: 12px; background: var(--bg2); padding: 2px 6px; border-radius: 4px; }

    .sl {
      font-size: 11px; font-weight: 500; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text2); margin-bottom: 10px;
    }
    .sh {
      font-size: 11px; color: var(--text2); font-weight: 400;
      text-transform: none; letter-spacing: 0; margin-left: 6px; opacity: .75;
    }

    hr { border: none; border-top: 0.5px solid var(--bdr); margin: 1.5rem 0; }

    .srow { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .srow label { font-size: 13px; color: var(--text2); min-width: 60px; }
    .srow input[type=range] { flex: 1; accent-color: var(--info-text); }
    .srow span { font-size: 13px; font-weight: 500; min-width: 72px; text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }

    select {
      width: 100%; padding: 8px 10px; border-radius: var(--r);
      border: 0.5px solid var(--bdr2); background: var(--bg);
      color: var(--text); font-size: 13px; margin-bottom: 10px;
    }

    .ref {
      display: flex; flex-wrap: wrap; gap: 6px 16px;
      padding: 10px 12px; background: var(--bg2);
      border-radius: var(--r); margin-bottom: 4px;
    }
    .ref-item { font-size: 12px; color: var(--text2); font-variant-numeric: tabular-nums; }
    .ref-item b { font-weight: 500; color: var(--text); margin-right: 3px; }

    .seq-ed { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }

    .nc {
      position: relative; width: 88px;
      background: var(--bg2); border: 0.5px solid var(--bdr); border-radius: var(--r);
      padding: 5px 4px 8px; display: flex; flex-direction: column;
      align-items: center; gap: 2px; transition: border-color .1s, background .1s;
    }
    .nc.active { background: var(--info-bg); border-color: var(--info-text); }
    .nc.played { opacity: .4; }

    .del {
      position: absolute; top: 3px; right: 3px; width: 16px; height: 16px;
      border: none; background: transparent; color: var(--text2);
      font-size: 12px; cursor: pointer; padding: 0; line-height: 1;
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
    }
    .del:hover { background: var(--bg3); color: var(--text); }

    .nn {
      font-size: 22px; font-weight: 500; color: var(--text);
      cursor: pointer; user-select: none;
      margin-top: 5px; margin-bottom: 2px;
      width: 100%; text-align: center; border-radius: 4px; padding: 2px 0;
    }
    .nn:hover { background: var(--bg3); }
    .nn.rest { color: var(--text2); font-size: 17px; }

    .vrow { display: flex; gap: 2px; width: 100%; margin-bottom: 1px; }
    .vrow button {
      flex: 1; font-size: 9px; font-weight: 500; padding: 3px 0;
      border: 0.5px solid var(--bdr); border-radius: 3px;
      background: var(--bg); color: var(--text2);
      cursor: pointer; line-height: 1; font-family: monospace;
    }
    .vrow button:hover { background: var(--bg3); color: var(--text); }
    .vrow.dur button.on { background: var(--info-bg); color: var(--info-text); border-color: transparent; }
    .vrow.rst button.on { background: var(--warn-bg); color: var(--warn-text); border-color: transparent; }

    .vlbl { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); text-align: center; margin-bottom: 1px; }

    .add-btn {
      width: 88px; min-height: 116px; background: transparent;
      border: 0.5px dashed var(--bdr2); border-radius: var(--r);
      color: var(--text2); font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-family: inherit;
    }
    .add-btn:hover { background: var(--bg2); color: var(--text); border-style: solid; }

    .ctrls { display: flex; gap: 8px; flex-wrap: wrap; }
    .cb {
      cursor: pointer; font-size: 14px; padding: 9px 20px;
      border-radius: var(--r); border: 0.5px solid var(--bdr2);
      background: transparent; color: var(--text); font-family: inherit;
    }
    .cb:hover { background: var(--bg2); }
    .cb:active { transform: scale(.98); }
    .cb:disabled { opacity: .38; cursor: not-allowed; transform: none; }
    .cb.prim { background: var(--info-bg); color: var(--info-text); border-color: transparent; font-weight: 500; }
    .cb.prim:hover { opacity: .88; }
    .cb.lon { background: var(--suc-bg); color: var(--suc-text); border-color: transparent; }

    .status { font-size: 13px; color: var(--text2); min-height: 20px; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>Arduino buzzer emulator</h1>
  <p class="subtitle">Simulates pin 5 <code>tone()</code> / <code>noTone()</code> using BPM + standard note values &mdash; no hardware needed</p>

  <p class="sl">Tempo &amp; sound</p>
  <div class="srow"><label>BPM</label><input type="range" min="40" max="240" value="120" step="1" id="bpm" /><span id="bpm-out">120 BPM</span></div>
  <div class="srow"><label>Volume</label><input type="range" min="0" max="100" value="60" id="vol" /><span id="vol-out">60%</span></div>
  <select id="wave">
    <option value="square" selected>Square (closest to Arduino piezo)</option>
    <option value="triangle">Triangle (softer)</option>
    <option value="sawtooth">Sawtooth</option>
    <option value="sine">Sine (mellow)</option>
  </select>
  <div class="ref" id="ref"></div>

  <hr />

  <p class="sl">
    Sequence
    <span class="sh">click letter to cycle &middot; <span style="color:var(--info-text)">blue = note duration</span> &middot; <span style="color:var(--warn-text)">amber = rest after</span></span>
  </p>
  <p style="font-size:11px;color:var(--text2);margin-bottom:12px;">W = whole &nbsp; H = half &nbsp; Q = quarter &nbsp; E = eighth &nbsp; X = sixteenth &nbsp; R = rest</p>
  <div class="seq-ed" id="seq-ed"></div>

  <hr />

  <div class="ctrls">
    <button class="cb prim" id="pb">&#9654; Play</button>
    <button class="cb" id="sb" disabled>&#9632; Stop</button>
    <button class="cb" id="lb">Loop: off</button>
    <button class="cb" id="rb">&#8635; Reset</button>
  </div>
  <div class="status" id="st">Ready</div>
</div>

<script>
  const NC = ['C','D','E','F','G','A','B','R'];
  const NF = { C:261.6, D:293.7, E:329.6, F:349.2, G:392, A:220, B:246.9 };
  const NV = { W:4, H:2, Q:1, E:0.5, X:0.25 };
  const NV_KEYS = ['W','H','Q','E','X'];
  const NV_NAMES = { W:'whole', H:'half', Q:'quarter', E:'eighth', X:'sixteenth' };

  const DEFAULT_SEQ = [
    {n:'C',dur:'E',rst:'E'},{n:'D',dur:'E',rst:'E'},{n:'F',dur:'E',rst:'Q'},
    {n:'F',dur:'E',rst:'E'},{n:'F',dur:'E',rst:'E'},
    {n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'E'},
    {n:'C',dur:'E',rst:'E'},{n:'D',dur:'E',rst:'E'},{n:'F',dur:'E',rst:'Q'},
    {n:'F',dur:'E',rst:'E'},{n:'F',dur:'E',rst:'E'},
    {n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'X'},{n:'F',dur:'E',rst:'E'},
    {n:'F',dur:'Q',rst:'E'},{n:'F',dur:'Q',rst:'E'},{n:'E',dur:'E',rst:'Q'}
  ];

  let seq = DEFAULT_SEQ.map(s => ({...s}));
  let ci = -1, playing = false, looping = false, stopFlag = false;
  let ctx = null, gn = null, osc = null;

  function getBpm() { return +document.getElementById('bpm').value; }
  function ms(v) { return Math.round((60000 / getBpm()) * NV[v]); }

  function updateRef() {
    document.getElementById('ref').innerHTML =
      NV_KEYS.map(k => `<span class="ref-item"><b>${k}</b>${ms(k)} ms</span>`).join('');
  }

  function render() {
    const container = document.getElementById('seq-ed');
    container.innerHTML = '';

    seq.forEach((step, i) => {
      const card = document.createElement('div');
      card.className = 'nc' + (i === ci ? ' active' : i < ci ? ' played' : '');

      const del = document.createElement('button');
      del.className = 'del'; del.textContent = '\u00d7'; del.title = 'Remove';
      del.addEventListener('click', () => { if (playing) return; seq.splice(i, 1); render(); });

      const nn = document.createElement('div');
      nn.className = 'nn' + (step.n === 'R' ? ' rest' : '');
      nn.textContent = step.n === 'R' ? '\u2014' : step.n;
      nn.title = 'Click to cycle note';
      nn.addEventListener('click', () => {
        if (playing) return;
        seq[i].n = NC[(NC.indexOf(step.n) + 1) % NC.length];
        render();
      });

      const grp = document.createElement('div');
      grp.style.width = '100%';

      for (const [prop, cls] of [['dur','dur'],['rst','rst']]) {
        const row = document.createElement('div');
        row.className = 'vrow ' + cls;
        NV_KEYS.forEach(v => {
          const b = document.createElement('button');
          b.textContent = v;
          b.title = NV_NAMES[v] + ' (' + ms(v) + ' ms)';
          if (step[prop] === v) b.classList.add('on');
          b.addEventListener('click', () => { if (playing) return; seq[i][prop] = v; render(); });
          row.appendChild(b);
        });
        const lbl = document.createElement('div');
        lbl.className = 'vlbl';
        lbl.textContent = cls === 'dur' ? 'note' : 'rest';
        grp.appendChild(row); grp.appendChild(lbl);
      }

      card.appendChild(del); card.appendChild(nn); card.appendChild(grp);
      container.appendChild(card);
    });

    const add = document.createElement('button');
    add.className = 'add-btn'; add.textContent = '+'; add.title = 'Add note';
    add.addEventListener('click', () => { if (playing) return; seq.push({n:'C', dur:'E', rst:'E'}); render(); });
    container.appendChild(add);
  }

  function updateCards() {
    document.querySelectorAll('#seq-ed .nc').forEach((c, i) => {
      c.className = 'nc' + (i === ci ? ' active' : i < ci ? ' played' : '');
    });
  }

  render(); updateRef();

  document.getElementById('bpm').addEventListener('input', function() {
    document.getElementById('bpm-out').textContent = this.value + ' BPM';
    updateRef();
  });
  document.getElementById('vol').addEventListener('input', function() {
    document.getElementById('vol-out').textContent = this.value + '%';
    if (gn) gn.gain.value = this.value / 100 * 0.4;
  });

  const pb = document.getElementById('pb'), sb = document.getElementById('sb');
  const lb = document.getElementById('lb'), rb = document.getElementById('rb');
  const st = document.getElementById('st');

  lb.addEventListener('click', () => {
    looping = !looping;
    lb.textContent = 'Loop: ' + (looping ? 'on' : 'off');
    lb.className = 'cb' + (looping ? ' lon' : '');
  });

  rb.addEventListener('click', () => {
    if (playing) return;
    seq = DEFAULT_SEQ.map(s => ({...s}));
    ci = -1; render(); st.textContent = 'Reset to default sequence';
  });

  function sleep(t) { return new Promise(r => setTimeout(r, t)); }

  async function run() {
    const wave = document.getElementById('wave').value;
    do {
      for (let i = 0; i < seq.length; i++) {
        if (stopFlag) return;
        ci = i; updateCards();
        const { n, dur, rst } = seq[i];
        const dm = ms(dur), rm = ms(rst);
        st.textContent = n === 'R'
          ? `Rest \u2014 ${NV_NAMES[dur]} (${dm} ms)`
          : `${n} \u2014 ${NV_NAMES[dur]} note (${dm} ms) + ${NV_NAMES[rst]} rest (${rm} ms)`;
        if (n !== 'R') {
          osc = ctx.createOscillator(); osc.type = wave; osc.frequency.value = NF[n];
          osc.connect(gn); osc.start();
          await sleep(dm);
          osc.stop(); osc.disconnect(); osc = null;
        } else {
          await sleep(dm);
        }
        if (stopFlag) return;
        await sleep(rm);
      }
      if (!stopFlag && looping) {
        st.textContent = 'Looping\u2026'; ci = -1; updateCards();
        await sleep(500);
      }
    } while (looping && !stopFlag);
  }

  async function play() {
    if (playing) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gn = ctx.createGain(); gn.gain.value = document.getElementById('vol').value / 100 * 0.4;
    gn.connect(ctx.destination);
    stopFlag = false; playing = true; pb.disabled = true; sb.disabled = false;
    await run();
    if (!stopFlag) { st.textContent = 'Done'; ci = seq.length; updateCards(); }
    playing = false; pb.disabled = false; sb.disabled = true; ctx.close();
  }

  function stop() {
    stopFlag = true;
    if (osc) { try { osc.stop(); osc.disconnect(); } catch(e) {} }
    ci = -1; updateCards(); st.textContent = 'Stopped';
    playing = false; pb.disabled = false; sb.disabled = true;
  }

  pb.addEventListener('click', play);
  sb.addEventListener('click', stop);
</script>
</body>
</html>
